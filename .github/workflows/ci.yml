name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check api watcher

  test-api:
    name: Tests — API
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: freky_test
          POSTGRES_USER: freky
          POSTGRES_PASSWORD: freky
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U freky -d freky_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://freky:freky@localhost:5432/freky_test
      REDIS_URL: redis://localhost:6379/0
      MODEL_PATH: ""
      CONFIDENCE_THRESHOLD: "0.60"
      HIGH_CONFIDENCE_THRESHOLD: "0.85"
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        working-directory: api
        run: |
          # onnxruntime-gpu nao tem wheel para Python 3.12; substitui por CPU para testes
          grep -v onnxruntime-gpu requirements.txt > /tmp/req_no_gpu.txt
          pip install -r /tmp/req_no_gpu.txt
          pip install onnxruntime==1.19.2
          pip install -r requirements-dev.txt --no-deps

      - name: Run tests
        working-directory: api
        run: pytest -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: api/coverage.xml

  test-watcher:
    name: Tests — Watcher
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: watcher/requirements.txt

      - name: Install dependencies
        working-directory: watcher
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        working-directory: watcher
        run: pytest -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-watcher
          path: watcher/coverage.xml
