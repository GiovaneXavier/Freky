name: Model Evaluation

on:
  workflow_dispatch:
    inputs:
      weights_path:
        description: "Caminho para os pesos dentro do artefato (ex: best.pt)"
        required: false
        default: "best.pt"
      confidence:
        description: "Threshold de confiança para inferência"
        required: false
        default: "0.60"
  schedule:
    # Toda segunda-feira às 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  evaluate:
    name: Evaluate model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: model/training/requirements.txt

      - name: Install training dependencies
        working-directory: model/training
        run: pip install -r requirements.txt

      - name: Download latest model weights
        # Tenta baixar pesos de uma release tagged; pula sem erro se não houver
        continue-on-error: true
        run: |
          LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$LATEST" ]; then
            gh release download "$LATEST" \
              --repo ${{ github.repository }} \
              --pattern "*.pt" \
              --dir model/weights/ \
              2>/dev/null || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if weights exist
        id: weights-check
        run: |
          WEIGHTS=$(find model/weights -name "*.pt" | head -1)
          echo "path=$WEIGHTS" >> "$GITHUB_OUTPUT"
          if [ -z "$WEIGHTS" ]; then
            echo "Nenhum arquivo .pt encontrado em model/weights/. Pulando avaliação."
          fi

      - name: Run evaluation
        if: steps.weights-check.outputs.path != ''
        working-directory: model/training
        run: |
          python evaluate.py \
            --weights "${{ steps.weights-check.outputs.path }}" \
            --data ../data/hixray_yolo/dataset.yaml \
            --conf ${{ github.event.inputs.confidence || '0.60' }}

      - name: Upload evaluation report
        if: steps.weights-check.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: |
            model/runs/**/results.csv
            model/runs/**/confusion_matrix*.png
            model/runs/**/PR_curve.png
          retention-days: 30
