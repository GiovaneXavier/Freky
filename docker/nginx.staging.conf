server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Segurança ────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    server_tokens off;

    # ── Compressão ───────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── React SPA ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache agressivo para assets com hash no nome (ex: main.abc123.js)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Proxy para API ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Rate limiting básico para staging (evita sobrecarga acidental)
        limit_req_status 429;
    }

    # ── WebSocket ────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://api:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # ── Health endpoint (para load balancer / uptime check) ──────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Bloqueia acesso a arquivos ocultos ───────────────────────
    location ~ /\. {
        deny all;
    }
}
